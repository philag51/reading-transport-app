<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Bus Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>

    @font-face {
    font-family: "MyFont";
    src: url("/static/fonts/Netto-Regular-Demo-BF648bcd4ec503f.woff") format("woff");
    font-weight: normal;
    font-style: normal;
    }

    html, body {
        height: 100%;
        margin: 0;
        font-family: "MyFont", sans-serif;
    }

    body {
        display: flex;
        flex-direction: column;
    }

    .site-header {
        font-family: 'MyFont', sans-serif;
        color: rgb(255, 255, 255);
        background: #2b2a2a;
        box-shadow: 0 8px 16px -1px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        position: relative;
        z-index: 1000;
        width: 100%;
        box-sizing: border-box;
        padding: 6px 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-shrink: 0;
    }

    .site-header a {
        font-size: 16px;
        color: whitesmoke;
        text-decoration: none;
        font-weight: 500;
        padding: 10px 12px;
        border-radius: 6px;
    }

    @media (max-width: 768px) {
    .site-header {
        padding: 12px;
        gap: 12px;
    }

    .site-header h1 {
        font-size: 22px;
        line-height: 1.2;
    }

    .site-header a {
        font-size: 14px;
        padding: 6px 8px;
    }
}

    .site-header a:hover {
        color: #696969;
    }

    #map {
        flex: 1;
        width: 100%;
    }

  </style>
</head>
<body>

<header class="site-header">
    <h1>Public Transport in Reading</h1>
    <nav class="linx">
        <ul style="display: flex; gap: 20px; list-style: none; padding: 0;">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'buses' %}">Find the Next Buses!</a></li>
            <li><a href="{% url 'tracker' %}">Track a bus!</a></li>
            <li><a href="{% url 'trains' %}">Find the Next Trains!</a></li>
        </ul>
    </nav>
</header>

<div id="map"></div>

<script>
const map = L.map("map").setView([51.456, -0.969], 13);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

const markers = new Map();

function getMarkerRadius(zoom) {
  return Math.max(4, zoom - 6);
}

function updateMarkerSizes() {
  const zoom = map.getZoom();
  const radius = getMarkerRadius(zoom);

  for (const marker of markers.values()) {
    marker.setRadius(radius);
  }
}

map.on("zoomend", updateMarkerSizes);

function updateBuses() {
  fetch("{% url 'tracker_data' %}")
    .then(r => r.json())
    .then(buses => {
      if (buses.error) {
        console.error(buses.error);
        return;
      }

      const activeVehicles = new Set();
      const zoom = map.getZoom();
      const radius = getMarkerRadius(zoom);

      buses.forEach(bus => {
        const key = String(bus.vehicle);
        activeVehicles.add(key);

        const brand = bus.brand;
        const bgColor = bus.color || "#ffffff";
        const brandHtml = brand
          ? `
            <span style="
              display:inline-flex;
              align-items:center;
              justify-content:center;
              background:${bgColor};
              padding:6px 10px;
              box-shadow:0 1px 4px rgba(0,0,0,0.08);
            ">
              <img src="/static/${brand}" alt="Route logo" style="height:30px; display:block;">
            </span>
          `
          : "Unknown";

        const popupHtml = `
          ${brandHtml}<br>
          <b>Vehicle:</b> ${bus.vehicle}<br>
          <b>Route:</b> ${bus.route}<br>
          <b>Seen:</b> ${bus.seen ?? "Unknown"}
        `;

        const lat = Number(bus.lat);
        const lon = Number(bus.lon);

        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;

        if (markers.has(key)) {
          const m = markers.get(key);
          m.setLatLng([lat, lon]);
          m.setStyle({ color: bus.color, fillColor: bus.color });
          m.setRadius(radius);
          m.setTooltipContent(bus.route);
          m.setPopupContent(popupHtml);
        } else {
          const m = L.circleMarker([lat, lon], {
            radius: radius,
            color: bus.color,
            fillColor: bus.color,
            fillOpacity: 1
          })
          .bindTooltip(bus.route)
          .bindPopup(popupHtml)
          .addTo(map);

          markers.set(key, m);
        }
      });

      for (const [key, marker] of markers.entries()) {
        if (!activeVehicles.has(key)) {
          map.removeLayer(marker);
          markers.delete(key);
        }
      }
    })
    .catch(err => console.error("Tracker update failed:", err));
}

updateBuses();
setInterval(updateBuses, 10000);
</script>

</body>
</html>
