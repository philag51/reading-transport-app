{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Bus Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    @font-face {
      font-family: "MyFont";
      src: url("/static/fonts/Netto-Regular-Demo-BF648bcd4ec503f.woff") format("woff");
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: "MyFont", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* HEADER (NOW MATCHES OTHER PAGES EXACTLY) */
    .site-header {
      font-family: "MyFont", sans-serif;
      color: #fff;
      background: #2b2a2a;
      box-shadow: 0 8px 16px -1px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      z-index: 1000;
      width: 100%;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .site-header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      flex-shrink: 0;
    }

    .linx {
      min-width: 0;
      flex: 1 1 auto;
    }

    .linx ul {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      list-style: none;
      margin: 0;
      padding: 0;
      justify-content: flex-end;
      align-items: center;
    }

    .site-header a {
      display: inline-block;
      font-size: 16px;
      color: whitesmoke;
      text-decoration: none;
      font-weight: 500;
      padding: 10px 12px;
      border-radius: 6px;
      line-height: 1.2;
    }

    .site-header a:hover {
      color: #696969;
    }

    /* MAP */
    #map {
      flex: 1;
      width: 100%;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .site-header {
        align-items: flex-start;
      }

      .linx {
        width: 100%;
      }

      .linx ul {
        justify-content: flex-start;
      }
    }

    @media (max-width: 768px) {
      .site-header {
        padding: 12px 14px;
        gap: 12px;
      }

      .site-header h1 {
        font-size: 22px;
      }

      .site-header a {
        font-size: 14px;
        padding: 8px 10px;
      }

      .linx ul {
        gap: 8px 12px;
      }
    }

    @media (max-width: 480px) {
      .site-header {
        padding: 10px 12px;
      }

      .site-header h1 {
        font-size: 20px;
      }

      .linx ul {
        gap: 8px;
      }

      .site-header a {
        font-size: 13px;
        padding: 7px 9px;
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <h1>Public Transport in Reading</h1>
  <nav class="linx">
    <ul>
      <li><a href="{% url 'home' %}">Home</a></li>
      <li><a href="{% url 'buses' %}">Find the Next Buses!</a></li>
      <li><a href="{% url 'tracker' %}">Track a bus!</a></li>
      <li><a href="{% url 'trains' %}">Find the Next Trains!</a></li>
    </ul>
  </nav>
</header>

<div id="map"></div>

<script>
const map = L.map("map").setView([51.456, -0.969], 13);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

const markers = new Map();

function getMarkerRadius(zoom) {
  return Math.max(4, zoom - 6);
}

function updateMarkerSizes() {
  const zoom = map.getZoom();
  const radius = getMarkerRadius(zoom);
  for (const marker of markers.values()) {
    marker.setRadius(radius);
  }
}

map.on("zoomend", updateMarkerSizes);

function updateBuses() {
  fetch("{% url 'tracker_data' %}")
    .then(r => r.json())
    .then(buses => {
      if (buses.error) return;

      const activeVehicles = new Set();
      const zoom = map.getZoom();
      const radius = getMarkerRadius(zoom);

      buses.forEach(bus => {
        const key = String(bus.vehicle);
        activeVehicles.add(key);

        const brandHtml = bus.brand
          ? `<span style="display:inline-flex;align-items:center;justify-content:center;background:${bus.color || "#fff"};padding:6px 10px;">
               <img src="/static/${bus.brand}" style="height:30px;">
             </span>`
          : "Unknown";

        const popupHtml = `
          ${brandHtml}<br>
          <b>Vehicle:</b> ${bus.vehicle}<br>
          <b>Route:</b> ${bus.route}<br>
          <b>Seen:</b> ${bus.seen ?? "Unknown"}
        `;

        const lat = Number(bus.lat);
        const lon = Number(bus.lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;

        if (markers.has(key)) {
          const m = markers.get(key);
          m.setLatLng([lat, lon]);
          m.setStyle({ color: bus.color, fillColor: bus.color });
          m.setRadius(radius);
          m.setTooltipContent(bus.route);
          m.setPopupContent(popupHtml);
        } else {
          const m = L.circleMarker([lat, lon], {
            radius: radius,
            color: bus.color,
            fillColor: bus.color,
            fillOpacity: 1
          })
          .bindTooltip(bus.route)
          .bindPopup(popupHtml)
          .addTo(map);

          markers.set(key, m);
        }
      });

      for (const [key, marker] of markers.entries()) {
        if (!activeVehicles.has(key)) {
          map.removeLayer(marker);
          markers.delete(key);
        }
      }
    });
}

updateBuses();
setInterval(updateBuses, 10000);
</script>

</body>
</html>
